<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>縦捻転マスター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- いただいた指定色をTailwindに設定 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        golf: {
                            main: '#006036', /* 深い緑 */
                            sub: '#D0A900',  /* マスタードイエロー */
                            black: '#000000',
                            white: '#FFFFFF',
                            bg: '#F9FAFB'    /* ほんのりグレーな背景 */
                        }
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        /* ベーススタイル */
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: var(--color-golf-bg, #F9FAFB);
            color: #000000;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* アプリコンテナ */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: #F9FAFB;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* アニメーション */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-cup-in {
            animation: bounceIn 3.5s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes bounceIn {
            0% { transform: translateX(-40px) translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translateX(-20px) translateY(0) rotate(180deg); }
            50% { transform: translateX(-10px) translateY(-10px) rotate(270deg); }
            70% { transform: translateX(0) translateY(0) rotate(360deg); }
            80% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* -----------------------------------
           楽しいポップなUIパーツ（ネオブルータリズム風）
           ----------------------------------- */
        
        /* ポップなカード（選択肢など） */
        .card-pop {
            background: #FFFFFF;
            border-radius: 1.25rem;
            border: 2px solid #e5e7eb;
            box-shadow: 0 6px 0 #e5e7eb;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 6px; /* 影の分のスペース */
        }
        .card-pop:hover {
            border-color: #006036;
            box-shadow: 0 6px 0 #006036;
        }
        .card-pop:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #006036;
            margin-bottom: 6px; 
        }

        /* ポップなボタン */
        .btn-pop {
            border-radius: 1rem;
            font-weight: 700;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            cursor: pointer;
            border: none;
            margin-bottom: 6px;
            width: 100%;
        }
        .btn-pop-main {
            background-color: #006036;
            color: #FFFFFF;
            box-shadow: 0 6px 0 #00361e;
        }
        .btn-pop-main:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 transparent;
        }
        .btn-pop-sub {
            background-color: #D0A900;
            color: #FFFFFF;
            box-shadow: 0 6px 0 #997c00;
        }
        .btn-pop-sub:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 transparent;
        }

        /* 丸形アクションボタン（保存用など） */
        .btn-pop-circle {
            background-color: #006036;
            color: #FFFFFF;
            box-shadow: 0 4px 0 #00361e;
            border-radius: 50%;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .btn-pop-circle:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        /* 入力フォーム */
        .input-pop {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 500;
            background-color: #ffffff;
            color: #000000;
            transition: all 0.2s;
        }
        .input-pop:focus {
            outline: none;
            border-color: #006036;
            box-shadow: 0 0 0 4px rgba(0, 96, 54, 0.1);
        }

        /* タグボタン */
        .tag-btn {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            background-color: #ffffff;
            color: #6b7280;
            font-size: 0.85rem;
            font-weight: 700;
            border: 2px solid #e5e7eb;
            transition: all 0.2s;
        }
        .tag-btn.active {
            background-color: #D0A900;
            color: #ffffff;
            border-color: #D0A900;
        }

        /* モーダル */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: #FFFFFF;
            padding: 24px;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 340px;
            text-align: center;
            border: 3px solid #000000;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.1);
            transform: scale(0.95);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        /* スクロールバー非表示 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <!-- ヘッダー -->
    <header class="bg-golf-main text-white p-4 shadow-md sticky top-0 z-30 rounded-b-2xl">
        <div class="flex justify-between items-center relative">
            <div class="w-10"></div> <!-- スペーサー -->
            
            <!-- タイトル（クリックでリセット） -->
            <div onclick="app.showConfirm('最初の画面に戻りますか？', function(){ app.reset(); })" class="flex items-center justify-center cursor-pointer select-none">
                <div class="relative w-8 h-8 mr-2 flex items-end justify-center">
                    <i class="fas fa-flag text-golf-sub text-xl absolute bottom-0 right-0 z-0"></i>
                    <i class="fas fa-golf-ball text-white text-sm absolute bottom-0 right-1 z-10 animate-cup-in"></i>
                </div>
                <h1 class="text-xl font-black tracking-wider">縦捻転マスター</h1>
            </div>
            
            <!-- 使い方ボタン -->
            <button onclick="app.openHelp(event)" class="w-10 h-10 flex items-center justify-center text-white opacity-80 hover:opacity-100 bg-white/20 rounded-full transition-all" title="使い方">
                <i class="fas fa-question text-lg"></i>
            </button>
        </div>
    </header>

    <!-- コンテンツエリア -->
    <main id="content" class="flex-grow flex flex-col items-center fade-in pb-32 w-full pt-6 px-4">
        <!-- JavaScriptで描画 -->
    </main>

    <!-- フッター -->
    <footer class="bg-white border-t-2 border-gray-100 p-4 fixed bottom-0 w-full max-w-[600px] z-20">
        <div class="flex justify-between items-center text-sm mb-2 font-black">
            <span id="step-text" class="text-golf-black">準備</span>
            <span id="step-number" class="text-golf-sub">1 / 4</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
            <div id="progress-bar" class="bg-golf-main h-3 rounded-full transition-all duration-500" style="width: 25%"></div>
        </div>
        <div class="flex justify-between mt-3">
            <button id="btn-back" class="text-gray-400 hover:text-golf-black text-base px-2 py-1 invisible font-bold transition-colors" onclick="app.goBack()">
                <i class="fas fa-arrow-left mr-1"></i> 戻る
            </button>
            <button id="btn-home" class="text-golf-main hover:opacity-70 text-base px-2 py-1 font-bold transition-opacity" onclick="app.showConfirm('最初の画面に戻りますか？', function(){ app.reset(); })">
                最初から
            </button>
        </div>
    </footer>
</div>

<!-- 使い方ヘルプモーダル -->
<div id="help-modal" class="modal-overlay">
    <div class="modal-content text-left !p-6">
        <div class="flex justify-between items-center mb-5 border-b-2 border-gray-100 pb-3">
            <h3 class="text-xl font-black text-golf-main flex items-center"><i class="fas fa-book-open mr-2 text-golf-sub"></i>使い方ガイド</h3>
            <button onclick="app.closeHelp()" class="text-gray-400 hover:text-golf-black text-2xl font-bold">&times;</button>
        </div>
        
        <div class="mb-6">
            <h4 class="font-bold text-golf-black mb-2 text-sm"><i class="fas fa-bullseye text-golf-sub mr-1"></i>アプリの目的</h4>
            <p class="text-gray-600 text-sm leading-relaxed font-medium">
                「<span class="text-golf-main font-bold">縦捻転</span> → <span class="text-golf-sub font-bold">落下</span> → 左リード」の感覚を短時間で取り戻し、力を使わない再現性の高いスイングへ導く練習ナビです。
            </p>
        </div>

        <div>
            <h4 class="font-bold text-golf-black mb-3 text-sm"><i class="fas fa-list-ol text-golf-main mr-1"></i>使い方ステップ</h4>
            <ul class="text-gray-600 text-sm space-y-4 list-none pl-0">
                <li class="flex items-start">
                    <span class="bg-golf-sub text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-black mr-3 mt-0.5 flex-shrink-0 shadow-sm">1</span>
                    <span><span class="font-bold text-golf-black">今の状態を選択</span><br>「体が硬い」などその日の調子を選びます。</span>
                </li>
                <li class="flex items-start">
                    <span class="bg-golf-sub text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-black mr-3 mt-0.5 flex-shrink-0 shadow-sm">2</span>
                    <span><span class="font-bold text-golf-black">使用シーンを選択</span><br>「練習場」などの場面を選びます。</span>
                </li>
                <li class="flex items-start">
                    <span class="bg-golf-sub text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-black mr-3 mt-0.5 flex-shrink-0 shadow-sm">3</span>
                    <span><span class="font-bold text-golf-black">メニューを実践</span><br>表示されたポイントやドリルを行います。</span>
                </li>
                <li class="flex items-start">
                    <span class="bg-golf-sub text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-black mr-3 mt-0.5 flex-shrink-0 shadow-sm">4</span>
                    <span><span class="font-bold text-golf-black">メモ＆保存</span><br>練習の気づきを記録し、次回に活かします。</span>
                </li>
            </ul>
        </div>

        <button onclick="app.closeHelp()" class="btn-pop btn-pop-main w-full mt-6">閉じる</button>
    </div>
</div>

<!-- カスタムモーダル (アラート/確認用) -->
<div id="custom-modal" class="modal-overlay">
    <div class="modal-content">
        <div id="modal-icon" class="text-6xl mb-4">
            <!-- JSでアイコン注入 -->
        </div>
        <p id="modal-message" class="text-lg font-black text-golf-black mb-8 leading-relaxed">メッセージ</p>
        <div class="flex gap-3 justify-center" id="modal-buttons"></div>
    </div>
</div>

<script>
    const GOLF_DATA = {
        // 色設定を楽しいパレットに変更
        conditions: [
            { id: 'stiff', label: '体が硬い・回らない', icon: 'fa-user-injured', color: 'text-golf-sub', bg: 'bg-yellow-50' },
            { id: 'rush', label: '打ち急ぎ・力みがある', icon: 'fa-bolt', color: 'text-golf-sub', bg: 'bg-yellow-50' },
            { id: 'good', label: '調子は悪くない', icon: 'fa-smile', color: 'text-golf-main', bg: 'bg-green-50' }
        ],
        scenes: [
            { id: 'home', label: 'おうちで', icon: 'fa-home', color: 'text-golf-main', bg: 'bg-green-50' },
            { id: 'range', label: '練習場で', icon: 'fa-layer-group', color: 'text-golf-main', bg: 'bg-green-50' },
            { id: 'round', label: 'ラウンド直前', icon: 'fa-flag', color: 'text-golf-sub', bg: 'bg-yellow-50' }
        ],
        places: [
            { value: '家', label: '家' },
            { value: '通勤中', label: '通勤中' },
            { value: '練習場', label: '練習場' },
            { value: 'ゴルフ場', label: 'ゴルフ場' },
            { value: 'other', label: 'その他' }
        ],
        tags: [
            { id: 'all', label: '全体' },
            { id: 'driver', label: '1W' },
            { id: 'iron', label: 'アイアン' },
            { id: 'wedge', label: 'アプローチ' },
            { id: 'putter', label: 'パター' }
        ],
        contents: {
            'stiff-home': {
                quote: 'クラブを持たずに、背伸びをするだけで十分です。',
                focus: '背骨を軸に、右肩を高く、左肩を低く入れ替えるだけ。',
                drop: '脱力して、腕の重さだけでブラ〜ンと落とす。',
                lead: '左のお尻を、後ろの壁にコンと当てるイメージ。',
                ng: '無理にねじり上げようとして、息を止めること。',
                check: ['深呼吸しながらバックスイング', 'トップで3秒止まって脱力', 'スローモーションで素振り']
            },
            'stiff-range': {
                quote: '飛ばそうとしなくて大丈夫。ミート率だけ考えましょう。',
                focus: 'トップの位置は「手が耳の横」くらいでOK。',
                drop: 'クラブが背中側に「カトン」と落ちるのを待つ。',
                lead: '左足のかかとで地面をグッと踏むだけ。',
                ng: '手首の力でボールを叩きにいくこと。',
                check: ['ハーフスイングで芯に当てる', 'フィニッシュで3秒止まる', '目をつぶって素振り']
            },
            'stiff-round': {
                quote: '今日の主役は「重力」です。あなたは支えるだけ。',
                focus: 'バックスイングで右の股関節にシワを作る。',
                drop: '切り返しで「間（ま）」を作る。ワン、ツー。',
                lead: 'おへそを目標に向けるだけでスイング完了。',
                ng: '「当てよう」としてボールを凝視しすぎること。',
                check: ['素振りで芝をシュッと擦る', '空を見て深呼吸', '6割の力で振る']
            },
            'rush-home': {
                quote: 'スイングはダンスです。リズムを整えましょう。',
                focus: 'イチ、ニ、のサーン。声を出しながら。',
                drop: 'トップでクラブが「無重力」になる瞬間を感じて。',
                lead: '腕ではなく、左膝が動き出しの合図。',
                ng: 'トップから急激に加速しようとすること。',
                check: ['連続素振りでリズム確認', '鏡を見ながら頭の位置キープ', '柔らかいグリップで振る']
            },
            'rush-range': {
                quote: 'ボールは逃げません。ゆっくり上げて、ゆっくり下ろす。',
                focus: '右足の前でクラブが「ストン」と落ちる音を聞く。',
                drop: '手元が腰の高さに来るまで、何もしない感覚。',
                lead: '左サイドがドアを開けるように、道を空ける。',
                ng: '上半身から切り返すこと（突っ込みNG）。',
                check: ['ウェッジで50ヤードを打つ感覚で', 'トップで一度完全に静止して打つ', '高い球をイメージする']
            },
            'rush-round': {
                quote: '自分史上、もっともゆったりしたスイングで。',
                focus: 'クラブヘッドの重さを、指先で感じ続ける。',
                drop: '重力に任せれば、クラブは勝手に正しい軌道を通ります。',
                lead: '左への回転だけでボールを運ぶイメージ。',
                ng: '「飛ばしたい！」という欲を持つこと。',
                check: ['フィニッシュまで一息で振り切る', 'ターゲットより右を向いて打つ', 'グリップをゆるゆるにする']
            },
             'good-home': {
                quote: '良い感覚を脳に焼き付けましょう。反復が鍵です。',
                focus: '縦に上げて、縦に下ろす。シンプルな円運動。',
                drop: 'クラブが体に巻き付くような柔らかさを確認。',
                lead: '左サイドのリードで、手が勝手についてくる。',
                ng: '新しい動きを急に取り入れようとすること。',
                check: ['目を閉じて理想のスイングを想像', 'いつものリズムで素振り10回', 'フィニッシュのバランス確認']
            },
            'good-range': {
                quote: '気持ちよく振れている時こそ、基本の「縦」を意識。',
                focus: '右肩が下がりすぎないよう、縦回転をキープ。',
                drop: '自然落下を邪魔しない。',
                lead: 'インパクト以降、左肘をたたんでいく。',
                ng: '調子に乗ってマン振りすること。怪我のもとです。',
                check: ['得意な番手でリズム良く', 'アプローチで距離感を揃える', '真っ直ぐな弾道を目に焼き付ける']
            },
             'good-round': {
                quote: '今日は楽しむ日です。結果は後からついてきます。',
                focus: 'ターゲットだけを見て、無心で振る。',
                drop: 'トップでの「間」だけ忘れずに。',
                lead: 'スムーズな回転でフィニッシュまで。',
                ng: 'スイングの細かい形を気にすること。',
                check: ['素振りは1回だけ', '笑顔でアドレスに入る', 'グッドショットの余韻を味わう']
            }
        },
        default: {
            quote: '力を抜けば、クラブは仕事をします。',
            focus: '右向け右、左向け左。',
            drop: '重力に任せる。',
            lead: '回転で打つ。',
            ng: '力むこと。',
            check: ['素振り', '深呼吸', 'リズム']
        }
    };

    const app = {
        step: 1,
        state: { condition: null, scene: null, selectedTag: null, editingIndex: null },
        
        init: function() { this.renderStep1(); this.loadHistory(); },

        // モーダル
        modalCallback: null,
        showAlert: function(message) { this.showModal(message, 'alert', null); },
        showConfirm: function(message, callback) { this.showModal(message, 'confirm', callback); },
        showModal: function(message, type, callback) {
            const modal = document.getElementById('custom-modal');
            const msgEl = document.getElementById('modal-message');
            const iconEl = document.getElementById('modal-icon');
            const btnsEl = document.getElementById('modal-buttons');
            msgEl.textContent = message;
            this.modalCallback = callback;
            
            if (type === 'alert') {
                iconEl.innerHTML = '<i class="fas fa-check-circle text-golf-main"></i>';
                btnsEl.innerHTML = `<button onclick="app.closeModal()" class="btn-pop btn-pop-main">OK</button>`;
            } else {
                iconEl.innerHTML = '<i class="fas fa-question-circle text-golf-sub"></i>';
                btnsEl.innerHTML = `
                    <button onclick="app.closeModal()" class="btn-pop bg-gray-200 text-gray-700 shadow-[0_6px_0_#d1d5db] active:shadow-none active:translate-y-[6px]">キャンセル</button>
                    <button onclick="app.confirmModal()" class="btn-pop btn-pop-main">OK</button>
                `;
            }
            modal.classList.add('active');
        },
        closeModal: function() { document.getElementById('custom-modal').classList.remove('active'); this.modalCallback = null; },
        confirmModal: function() { if (this.modalCallback) { this.modalCallback(); } this.closeModal(); },

        // ヘルプモーダル
        openHelp: function(event) {
            if(event) event.stopPropagation();
            document.getElementById('help-modal').classList.add('active');
        },
        closeHelp: function() {
            document.getElementById('help-modal').classList.remove('active');
        },

        // ナビゲーション
        updateProgress: function(step, text) {
            this.step = step;
            document.getElementById('progress-bar').style.width = `${step * 25}%`;
            document.getElementById('step-text').textContent = text;
            document.getElementById('step-number').textContent = `${step} / 4`;
            const backBtn = document.getElementById('btn-back');
            step > 1 ? backBtn.classList.remove('invisible') : backBtn.classList.add('invisible');
        },
        goBack: function() {
            if (this.step === 2) this.renderStep1();
            if (this.step === 3) this.renderStep2();
            if (this.step === 4) {
                if (this.state.editingIndex !== null) { this.cancelEdit(); this.renderStep3(); }
                else { this.renderStep3(); }
            }
        },
        reset: function() {
            this.state = { condition: null, scene: null, selectedTag: null, editingIndex: null };
            this.renderStep1();
            window.scrollTo(0, 0);
        },

        // レンダリング
        renderStep1: function() {
            this.updateProgress(1, '今の状態は？');
            const hour = new Date().getHours();
            let greeting = 'こんにちは';
            if (hour >= 4 && hour < 11) greeting = 'おはようございます';
            else if (hour >= 18 || hour < 4) greeting = 'こんばんは';

            const history = JSON.parse(localStorage.getItem('golfHistory') || '[]');
            const historyHtml = history.slice(0, 3).map((h, index) => {
                const tagLabel = GOLF_DATA.tags.find(t => t.id === h.tag)?.label || '全体';
                return `
                <div class="bg-white p-4 mb-4 rounded-2xl border-2 border-gray-200 shadow-sm relative">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-2 text-xs font-bold">
                            <span class="text-golf-main"><i class="far fa-clock mr-1"></i>${h.dateDisplay}</span>
                            <span class="bg-gray-100 px-2 py-1 rounded-md text-gray-600">${h.place}</span>
                            <span class="bg-golf-sub text-white px-2 py-1 rounded-md">${tagLabel}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); app.editNote(${index}, event)" class="w-8 h-8 rounded-full bg-green-50 text-golf-main hover:bg-green-100 transition flex items-center justify-center font-bold">
                                <i class="fas fa-pen text-xs"></i>
                            </button>
                            <button onclick="event.stopPropagation(); app.deleteNote(${index}, event)" class="w-8 h-8 rounded-full bg-red-50 text-red-500 hover:bg-red-100 transition flex items-center justify-center font-bold">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <div class="text-golf-black text-base font-medium leading-relaxed pl-3 border-l-4 border-golf-main">${h.note}</div>
                </div>
            `}).join('');

            const historySection = history.length > 0 ? `
                <div class="w-full mt-8 mb-4 fade-in delay-100">
                    <h3 class="text-golf-black font-black text-sm mb-4 border-b-4 border-golf-main inline-block pb-1">
                        <i class="fas fa-history mr-1 text-golf-sub"></i> 前回の気づき
                    </h3>
                    ${historyHtml}
                </div>
            ` : '';

            const html = `
                <div class="text-center w-full max-w-[600px] fade-in">
                    <h2 class="text-2xl font-black text-golf-main mb-2">${greeting}</h2>
                    <p class="text-gray-600 mb-8 font-bold">今日の身体の調子はいかがですか？</p>
                    
                    <div class="grid grid-cols-1 gap-2">
                        ${GOLF_DATA.conditions.map(item => `
                            <button onclick="app.selectCondition('${item.id}')" 
                                class="card-pop w-full p-5 text-left flex items-center group cursor-pointer">
                                <div class="${item.bg} ${item.color} w-14 h-14 rounded-full flex items-center justify-center text-2xl mr-4 flex-shrink-0 font-black">
                                    <i class="fas ${item.icon}"></i>
                                </div>
                                <div class="flex-grow">
                                    <h3 class="text-lg font-black text-golf-black group-hover:text-golf-main transition-colors">${item.label}</h3>
                                </div>
                                <div class="bg-gray-100 w-8 h-8 rounded-full flex items-center justify-center text-gray-400 group-hover:bg-golf-main group-hover:text-white transition-colors">
                                    <i class="fas fa-chevron-right text-sm"></i>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                    ${historySection}
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        },

        selectCondition: function(id) { this.state.condition = id; this.renderStep2(); },

        renderStep2: function() {
            this.updateProgress(2, 'これからの場面');
            const html = `
                <div class="text-center w-full max-w-[600px] fade-in">
                    <h2 class="text-2xl font-black text-golf-main mb-2">練習の場所は？</h2>
                    <p class="text-gray-600 mb-8 font-bold">場面に合わせたメニューを作ります</p>
                    
                    <div class="grid grid-cols-1 gap-2">
                        ${GOLF_DATA.scenes.map(item => `
                            <button onclick="app.selectScene('${item.id}')" 
                                class="card-pop w-full p-5 text-left flex items-center group cursor-pointer">
                                <div class="${item.bg} ${item.color} w-14 h-14 rounded-full flex items-center justify-center text-2xl mr-4 flex-shrink-0 font-black">
                                    <i class="fas ${item.icon}"></i>
                                </div>
                                <div class="flex-grow">
                                    <h3 class="text-lg font-black text-golf-black group-hover:text-golf-main transition-colors">${item.label}</h3>
                                </div>
                                <div class="bg-gray-100 w-8 h-8 rounded-full flex items-center justify-center text-gray-400 group-hover:bg-golf-main group-hover:text-white transition-colors">
                                    <i class="fas fa-chevron-right text-sm"></i>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        },

        selectScene: function(id) { this.state.scene = id; this.renderStep3(); },

        renderStep3: function() {
            this.updateProgress(3, '本日のメニュー');
            const key = `${this.state.condition}-${this.state.scene}`;
            const data = GOLF_DATA.contents[key] || GOLF_DATA.contents['stiff-home']; 

            const html = `
                <div class="w-full max-w-[600px] fade-in">
                    <!-- 今日の一言 -->
                    <div class="bg-golf-sub text-white rounded-2xl p-6 mb-8 shadow-sm relative overflow-hidden border-b-4 border-[#a68700]">
                        <div class="absolute -top-2 -right-4 text-white opacity-20 text-9xl transform rotate-12 -z-10">
                            <i class="fas fa-quote-right"></i>
                        </div>
                        <p class="text-xs font-black mb-2 uppercase tracking-widest opacity-90"><i class="fas fa-lightbulb mr-1"></i>Today's Advice</p>
                        <p class="text-xl font-black leading-relaxed relative z-10 text-white">「${data.quote}」</p>
                    </div>

                    <!-- 3つの柱 -->
                    <div class="grid gap-4 mb-8">
                        <div class="bg-white rounded-2xl p-5 border-2 border-gray-200 border-l-8 border-l-golf-sub shadow-sm">
                            <h4 class="text-golf-sub font-black text-xs mb-1 uppercase tracking-wider"><i class="fas fa-sync-alt mr-2 text-golf-main"></i>縦捻転の意識</h4>
                            <p class="text-lg font-bold text-golf-black">${data.focus}</p>
                        </div>
                        <div class="bg-white rounded-2xl p-5 border-2 border-gray-200 border-l-8 border-l-golf-main shadow-sm">
                            <h4 class="text-golf-main font-black text-xs mb-1 uppercase tracking-wider"><i class="fas fa-arrow-down mr-2 text-golf-sub"></i>落下の合図</h4>
                            <p class="text-lg font-bold text-golf-black">${data.drop}</p>
                        </div>
                        <div class="bg-white rounded-2xl p-5 border-2 border-gray-200 border-l-8 border-l-golf-black shadow-sm">
                            <h4 class="text-golf-black font-black text-xs mb-1 uppercase tracking-wider"><i class="fas fa-share mr-2 text-golf-main"></i>左リードの結果</h4>
                            <p class="text-lg font-bold text-golf-black">${data.lead}</p>
                        </div>
                    </div>

                    <!-- NG -->
                    <div class="bg-gray-100 rounded-2xl p-5 mb-8 border-2 border-gray-200 text-golf-black">
                        <h4 class="font-black mb-2 flex items-center text-red-600"><i class="fas fa-ban mr-2"></i>今日はやらない（NG）</h4>
                        <p class="font-bold">${data.ng}</p>
                    </div>

                    <div class="bg-white rounded-2xl p-6 mb-8 border-2 border-gray-200 shadow-sm">
                        <h3 class="text-lg font-black text-golf-main mb-5 border-b-2 border-gray-100 pb-3"><i class="fas fa-check-square mr-2 text-golf-sub"></i>3球チェックメニュー</h3>
                        <ul class="space-y-4">
                            ${data.check.map((item, index) => `
                                <li class="flex items-center">
                                    <span class="bg-golf-sub text-white rounded-full w-7 h-7 flex items-center justify-center font-black text-sm mr-3 flex-shrink-0 shadow-sm">${index + 1}</span>
                                    <span class="text-golf-black font-bold">${item}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>

                    <button onclick="app.renderStep4()" class="btn-pop btn-pop-main w-full text-lg">
                        <i class="fas fa-pencil-alt mr-2"></i>練習を終えてメモへ
                    </button>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
            window.scrollTo(0, 0);
        },

        renderStep4: function() {
            this.updateProgress(4, '気づきメモ');
            
            let noteValue = '', dateValue = new Date().toISOString().split('T')[0], placeValue = '', tagValue = 'all', otherPlaceValue = '';
            const isEditing = this.state.editingIndex !== null;
            const history = JSON.parse(localStorage.getItem('golfHistory') || '[]');

            if (isEditing) {
                const target = history[this.state.editingIndex];
                if (target) {
                    noteValue = target.note;
                    dateValue = target.dateRaw || dateValue; 
                    tagValue = target.tag || 'all';
                    const isKnownPlace = GOLF_DATA.places.some(p => p.value === target.place && p.value !== 'other');
                    if (isKnownPlace) { placeValue = target.place; } 
                    else { placeValue = 'other'; otherPlaceValue = target.place; }
                }
                this.state.selectedTag = tagValue;
            } else {
                if (!this.state.selectedTag) this.state.selectedTag = 'all';
            }

            const historyHtml = history.slice(0, 3).map((h, index) => {
                const tagLabel = GOLF_DATA.tags.find(t => t.id === h.tag)?.label || '全体';
                const activeClass = (this.state.editingIndex === index) ? 'border-golf-sub shadow-[0_0_0_4px_rgba(208,169,0,0.2)]' : 'border-gray-200';
                return `
                <div class="bg-white p-4 mb-4 rounded-2xl border-2 ${activeClass} shadow-sm relative group transition-all">
                    <div class="flex justify-between items-start mb-3">
                        <div class="text-xs text-gray-500 flex items-center gap-2 font-bold">
                            <span class="text-golf-main"><i class="far fa-clock mr-1"></i>${h.dateDisplay}</span>
                            <span class="bg-gray-100 px-2 py-1 rounded-md text-gray-600">${h.place}</span>
                            <span class="bg-golf-sub text-white px-2 py-1 rounded-md">${tagLabel}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); app.editNote(${index}, event)" class="w-8 h-8 rounded-full bg-green-50 text-golf-main hover:bg-green-100 transition flex items-center justify-center font-bold">
                                <i class="fas fa-pen text-xs"></i>
                            </button>
                            <button onclick="event.stopPropagation(); app.deleteNote(${index}, event)" class="w-8 h-8 rounded-full bg-red-50 text-red-500 hover:bg-red-100 transition flex items-center justify-center font-bold">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <div class="text-golf-black text-base font-medium leading-relaxed pl-3 border-l-4 border-golf-main">${h.note}</div>
                </div>
            `}).join('');

            const emptyHistoryHtml = `
                <div class="text-center py-10 text-gray-400 bg-white rounded-2xl border-2 border-dashed border-gray-300">
                    <i class="fas fa-pen-fancy text-4xl mb-3 opacity-30 text-golf-main"></i>
                    <p class="text-sm font-bold">まだ記録がありません。<br>今日の気づきを書いてみましょう。</p>
                </div>
            `;

            const saveBtnLabel = isEditing ? '更新' : '保存';
            const saveBtnIcon = isEditing ? 'fa-sync-alt' : 'fa-paper-plane';

            const html = `
                <div class="w-full max-w-[600px] fade-in">
                    
                    <div class="mb-8">
                         <div class="flex items-center justify-between mb-4 px-1">
                            <h3 class="text-golf-black font-black text-sm border-b-4 border-golf-main pb-1">
                                <i class="fas fa-history mr-1 text-golf-sub"></i> 過去のログ
                            </h3>
                            <span class="text-xs text-gray-600 bg-gray-200 px-2 py-1 rounded-md font-bold">最新3件</span>
                        </div>
                        <div class="space-y-1">
                            ${history.length > 0 ? historyHtml : emptyHistoryHtml}
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl p-5 border-2 border-gray-200 shadow-sm relative z-10 transition-all ${isEditing ? 'border-golf-sub shadow-[0_0_0_4px_rgba(208,169,0,0.2)]' : ''}">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-2 text-sm text-golf-main font-black">
                                <i class="fas ${isEditing ? 'fa-pen' : 'fa-edit'}"></i> ${isEditing ? '編集中' : '今日の気づき'}
                            </div>
                            ${isEditing ? `<button onclick="app.cancelEdit()" class="text-xs text-gray-600 bg-gray-100 px-3 py-1 rounded-md font-bold hover:bg-gray-200 transition">キャンセル</button>` : ''}
                        </div>

                        <div class="space-y-3 mb-4">
                            <div class="flex items-center gap-2">
                                <input type="date" id="date-input" value="${dateValue}" class="input-pop text-sm font-bold">
                                <select id="place-select" class="flex-grow input-pop text-sm font-bold" onchange="app.toggleOtherPlaceInput(this.value)">
                                    <option value="" disabled ${!placeValue ? 'selected' : ''}>場所を選択</option>
                                    ${GOLF_DATA.places.map(p => `<option value="${p.value}" ${p.value === placeValue ? 'selected' : ''}>${p.label}</option>`).join('')}
                                </select>
                            </div>
                            <input type="text" id="place-other-input" value="${otherPlaceValue}" class="input-pop w-full text-sm font-bold ${placeValue === 'other' ? '' : 'hidden'}" placeholder="場所を入力">

                            <div class="flex flex-wrap gap-2 pt-2" id="tag-container">
                                ${GOLF_DATA.tags.map(tag => `
                                    <button onclick="app.selectTag('${tag.id}')" 
                                        class="tag-btn ${tag.id === this.state.selectedTag ? 'active' : ''}" 
                                        id="tag-${tag.id}">
                                        ${tag.label}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <div class="relative mt-4">
                            <textarea id="note-input" class="input-pop pb-14" rows="3" placeholder="ここに入力...（例：力を抜いたら球が伸びた）">${noteValue}</textarea>
                            <div class="absolute bottom-3 right-3 flex items-center gap-3">
                                <span class="text-xs font-bold text-gray-400">コピーもされます</span>
                                <button onclick="app.saveNote()" class="btn-pop-circle" title="${saveBtnLabel} & コピー">
                                    <i class="fas ${saveBtnIcon} text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
            if (isEditing) window.scrollTo(0, document.body.scrollHeight);
            else window.scrollTo(0, 0);
        },

        selectTag: function(tagId) {
            this.state.selectedTag = tagId;
            document.querySelectorAll('.tag-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tag-${tagId}`).classList.add('active');
        },
        toggleOtherPlaceInput: function(value) {
            const otherInput = document.getElementById('place-other-input');
            value === 'other' ? otherInput.classList.remove('hidden') : otherInput.classList.add('hidden');
        },
        editNote: function(index, event) {
            if (event) event.stopPropagation();
            this.state.editingIndex = index;
            this.step = 4;
            this.renderStep4();
        },
        cancelEdit: function() { this.state.editingIndex = null; this.state.selectedTag = null; this.renderStep4(); },
        saveNote: function() {
            const dateInput = document.getElementById('date-input').value;
            const placeSelect = document.getElementById('place-select');
            let placeValue = placeSelect.value;
            const noteInput = document.getElementById('note-input').value.trim();
            const tagId = this.state.selectedTag || 'all';
            if (placeValue === 'other') placeValue = document.getElementById('place-other-input').value.trim();

            if (!noteInput) { this.showAlert('気づきが一言あると、次回につながります！'); return; }
            if (!placeValue) placeValue = '場所指定なし';

            const dateObj = new Date(dateInput);
            const dateDisplay = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
            const tagName = GOLF_DATA.tags.find(t => t.id === tagId)?.label || '';
            const entry = {
                dateRaw: dateInput, dateDisplay: dateDisplay, place: placeValue, tag: tagId, note: noteInput, condition: this.state.condition
            };

            const history = JSON.parse(localStorage.getItem('golfHistory') || '[]');
            if (this.state.editingIndex !== null) {
                if (history[this.state.editingIndex]) history[this.state.editingIndex] = entry;
                this.state.editingIndex = null;
            } else {
                history.unshift(entry);
            }
            localStorage.setItem('golfHistory', JSON.stringify(history));

            const copyText = `【縦捻転マスター】 ${dateDisplay}\n場所: ${placeValue}\nテーマ: ${tagName}\nメモ: ${noteInput}`;
            navigator.clipboard.writeText(copyText).then(() => { this.showAlert('保存＆コピーしました！'); })
                                                   .catch(() => { this.showAlert('保存しました！'); });
            this.renderStep4();
        },
        deleteNote: function(index, event) {
            if (event) event.stopPropagation();
            this.showConfirm('このメモを削除しますか？', () => {
                const idx = Number(index);
                const history = JSON.parse(localStorage.getItem('golfHistory') || '[]');
                if (idx >= 0 && idx < history.length) {
                    history.splice(idx, 1);
                    localStorage.setItem('golfHistory', JSON.stringify(history));
                    if (this.state.editingIndex === idx) this.state.editingIndex = null;
                    else if (this.state.editingIndex > idx) this.state.editingIndex--;
                    
                    this.step === 1 ? this.renderStep1() : this.renderStep4();
                }
            });
        },
        loadHistory: function() {
            if (!localStorage.getItem('golfHistory')) localStorage.setItem('golfHistory', JSON.stringify([]));
        }
    };
    window.app = app;
    app.init();
</script>
</body>
</html>
